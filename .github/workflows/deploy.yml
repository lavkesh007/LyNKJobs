name: Auto Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/LyNKJobs/LyNKJobs/LyNKJobs
            git pull origin main
            mvn clean package
            source ~/.bashrc
            pm2 restart backend || pm2 start "java -jar target/JobPortfolio-0.0.1-SNAPSHOT.jar" --name backend
            pm2 save
